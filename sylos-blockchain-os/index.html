  <!-- Accessibility Skip Links -->
  <style>
    .skip-link {
      position: absolute;
      left: -9999px;
      z-index: 9999;
      padding: 8px 16px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .skip-link:focus {
      left: 8px;
      top: 8px;
      z-index: 10000;
      outline: 2px solid #8B5CF6;
      outline-offset: 2px;
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {
      .high-contrast {
        border: 2px solid currentColor !important;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Focus visible improvements */
    .focus-visible {
      outline: 2px solid #8B5CF6;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Touch target improvements */
    .touch-target {
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <!-- Fallback for users with JavaScript disabled -->
  <noscript>
    <div
      style="text-align: center; padding: 50px; font-family: system-ui; background: #0f172a; color: white; min-height: 100vh;">
      <h1 style="font-size: 2rem; margin-bottom: 1rem; color: #8B5CF6;">SylOS requires JavaScript</h1>
      <p style="font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6;">
        SylOS is a modern blockchain operating system that requires JavaScript to function properly.
        Please enable JavaScript in your browser settings to access the full functionality.
      </p>
      <div
        style="background: rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 8px; max-width: 600px; margin: 0 auto;">
        <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Enable JavaScript Instructions:</h2>
        <ul style="text-align: left; list-style-type: disc; padding-left: 2rem; line-height: 1.8;">
          <li>Chrome: Settings → Privacy and security → Site settings → JavaScript</li>
          <li>Firefox: about:config → javascript.enabled → true</li>
          <li>Safari: Preferences → Security → Enable JavaScript</li>
          <li>Edge: Settings → Site permissions → JavaScript</li>
        </ul>
      </div>
      <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.8;">
        For the best experience, we recommend using the latest version of Chrome, Firefox, Safari, or Edge.
      </p>
    </div>
  </noscript>

  <!-- Performance and Analytics -->
  <script>
    // Basic performance monitoring
    if ('performance' in window) {
      window.addEventListener('load', function () {
        setTimeout(function () {
          var perfData = performance.getEntriesByType('navigation')[0];
          if (perfData) {
            console.log('Page Load Time:', perfData.loadEventEnd - perfData.loadEventStart, 'ms');
          }
        }, 0);
      });
    }

    // Global error reporting
    window.addEventListener('error', function (event) {
      console.error('Application Error:', event.error);
    });
  </script>
