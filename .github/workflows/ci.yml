name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check (agent-core)
        run: cd packages/agent-core && npx tsc --noEmit

      - name: Run unit tests
        run: cd packages/agent-core && pnpm run test

      - name: Build dashboard
        run: cd apps/dashboard && npx vite build
