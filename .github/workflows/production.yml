name: Xorb Production CI/CD

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check (agent-core)
        working-directory: ./packages/agent-core
        run: npx tsc --noEmit

      - name: TypeScript Type Check (API)
        working-directory: ./apps/api
        run: npx tsc --noEmit

      - name: Run Unit Tests (agent-core)
        working-directory: ./packages/agent-core
        run: pnpm run test

      - name: Run API Tests
        working-directory: ./apps/api
        run: pnpm run test
        env:
          NODE_ENV: test

  smart-contracts:
    name: Compile & Test Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        working-directory: ./xorb-contracts
        run: pnpm install --frozen-lockfile

      - name: Compile Smart Contracts
        working-directory: ./xorb-contracts
        run: pnpm exec hardhat compile

      - name: Run Contract Tests
        working-directory: ./xorb-contracts
        run: pnpm exec hardhat test

  dashboard-build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Dashboard
        working-directory: ./apps/dashboard
        run: pnpm run build
        env:
          VITE_API_URL: https://api.xorb.xyz

  deploy:
    name: Deploy to Vercel
    needs: [lint-typecheck-test, smart-contracts, dashboard-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy API to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
