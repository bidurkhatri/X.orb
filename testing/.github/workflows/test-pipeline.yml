name: SylOS Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'
  JAVA_VERSION: '11'

jobs:
  # Lint and Code Quality Checks
  lint-and-quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run Prettier
        run: npm run format:check
        continue-on-error: false

      - name: Run TypeScript check
        run: npm run type-check
        continue-on-error: false

      - name: Code complexity analysis
        run: |
          npm install -g complexity-report
          complexity-report src --format json > complexity-report.json
        continue-on-error: true

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complexity-report
          path: complexity-report.json

  # Unit and Integration Tests
  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          CI: true

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          CI: true
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Generate test coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results.xml
            junit.xml

  # Smart Contract Tests (if applicable)
  smart-contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[contracts]') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup Hardhat
        run: |
          npm install --save-dev hardhat @nomicfoundation/hardhat-toolbox
          npx hardhat compile

      - name: Run smart contract tests
        run: npm run test:contracts
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}

      - name: Run gas reporter
        run: npx hardhat test --reporter gas-reporter
        continue-on-error: true

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: artifacts/
          retention-days: 30

  # End-to-End Tests (Web)
  e2e-tests-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start application
        run: npm run start:test &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for application
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: test-results/

  # Cypress E2E Tests
  cypress-e2e-tests:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: npm run start:test &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for application
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Cypress tests
        run: npx cypress run --record --parallel --group "E2E Tests"
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_URL: http://localhost:3000

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos/

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[performance]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: npm run start:test &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for application
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.12.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Run load tests
        run: |
          npm install -g artillery
          artillery run performance/load-test.yml --output performance/load-test-results.json
        env:
          BASE_URL: http://localhost:3000

      - name: Analyze load test results
        run: |
          node performance/load-test-processor.js
        continue-on-error: true

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            performance/*.json
            lhci-*/

  # Security Testing
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[security]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Run dependency security check
        run: |
          npm install -g @snyk/cli
          snyk test --severity-threshold=medium
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run security tests
        run: npm run test:security

      - name: Run OWASP ZAP scan
        run: |
          docker run -t owasp/zap2docker-stable zap-baseline.py \
            -t http://localhost:3000 \
            -J security/scan-results.json
        continue-on-error: true

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            security/
            snyk-report.html

  # Mobile Testing (Simulated)
  mobile-tests:
    name: Mobile Tests
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[mobile]') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Detox
        run: |
          npm install -g detox-cli
          npm install --save-dev detox

      - name: Build mobile app
        run: npm run build:mobile
        continue-on-error: true

      - name: Run Detox tests
        run: detox test --configuration ios.sim.release
        env:
          CI: true

      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: |
            mobile/__tests__/screenshots/
            mobile/__tests__/videos/

  # Cross-Platform Compatibility
  cross-platform-tests:
    name: Cross-Platform Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run platform-specific tests
        run: npm run test:platform
        env:
          CI: true
          TEST_PLATFORM: ${{ matrix.os }}

      - name: Upload platform results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: platform-results-${{ matrix.os }}
          path: test-results/

  # API Testing (if applicable)
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[api]') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: npm run start:api &
        env:
          NODE_ENV: test
          PORT: 3001

      - name: Wait for API
        run: npx wait-on http://localhost:3001/health --timeout 60000

      - name: Run API tests
        run: npm run test:api
        env:
          API_BASE_URL: http://localhost:3001

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            api-tests/
            coverage-api/

  # Blockchain Integration Tests
  blockchain-tests:
    name: Blockchain Integration Tests
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[blockchain]') || github.event_name == 'schedule'
    services:
      ganache:
        image: trufflesuite/ganache:latest
        ports:
          - 8545:8545
        env:
          GANACHE_MNEMONIC: "test test test test test test test test test test test junk"
          GANACHE_ACCOUNT_BALANCE: "10000000000000000000000"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: npm run start:blockchain-test &
        env:
          NODE_ENV: test
          BLOCKCHAIN_RPC_URL: http://localhost:8545

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:8545 --timeout 60000

      - name: Run blockchain tests
        run: npm run test:blockchain
        env:
          BLOCKCHAIN_RPC_URL: http://localhost:8545
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}

      - name: Upload blockchain test results
        uses: actions/upload-artifact@v4
        with:
          name: blockchain-test-results
          path: |
            blockchain-tests/
            blockchain-coverage/

  # Test Report Generation
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [
      lint-and-quality,
      unit-integration-tests,
      e2e-tests-web,
      cypress-e2e-tests,
      performance-tests,
      security-tests,
      mobile-tests
    ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate test report
        run: |
          mkdir -p test-report
          node scripts/generate-test-report.js > test-report/test-report.html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report/test-report.html', 'utf8');
            const body = `## Test Results Summary
            
            ${report}
            
            ## Test Artifacts
            All test artifacts have been uploaded to the Actions tab.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Notification and Final Status
  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test-report]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#testing'
          text: 'SylOS testing pipeline failed. Check the logs for details.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#testing'
          text: 'SylOS testing pipeline completed successfully!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [notify-results]
    if: always()
    steps:
      - name: Clean up test environments
        run: |
          pkill -f "npm run start" || true
          pkill -f "artillery" || true
          docker stop $(docker ps -a -q) || true
          docker rm $(docker ps -a -q) || true