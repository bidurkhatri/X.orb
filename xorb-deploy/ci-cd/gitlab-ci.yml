# Xorb CI/CD Pipeline Configuration for GitLab

stages:
  - install
  - test
  - build
  - deploy
  - notify

variables:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"

# Cache configuration
cache:
  paths:
    - node_modules/
    - .pnpm-store/

# Global job configuration
.default_job: &default_job
  image: node:18-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir ~/.pnpm-store
    - pnpm install --frozen-lockfile

# Code Quality and Testing
lint_test:minimax_os:
  <<: *default_job
  stage: test
  script:
    - cd minimax-os
    - pnpm run lint
    - pnpm run type-check || true
    - pnpm run test || true
  artifacts:
    reports:
      junit: minimax-os/coverage/junit.xml
    paths:
      - minimax-os/dist/
    expire_in: 1 hour
  only:
    - merge_requests
    - main
    - develop

lint_test:blockchain_os:
  <<: *default_job
  stage: test
  script:
    - cd xorb-blockchain-os
    - pnpm run lint
    - pnpm run type-check || true
    - pnpm run test || true
  artifacts:
    reports:
      junit: xorb-blockchain-os/coverage/junit.xml
    paths:
      - xorb-blockchain-os/dist/
    expire_in: 1 hour
  only:
    - merge_requests
    - main
    - develop

lint_test:mobile:
  <<: *default_job
  stage: test
  script:
    - cd xorb-mobile-new
    - pnpm install
    - pnpm run lint
    - pnpm run test || true
  artifacts:
    paths:
      - xorb-mobile-new/dist/
    expire_in: 1 hour
  only:
    - merge_requests
    - main
    - develop

# Security Audit
security_audit:
  <<: *default_job
  stage: test
  script:
    - npm install -g audit-ci
    - for project in minimax-os xorb-blockchain-os xorb-mobile-new; do
        cd $project
        pnpm audit --audit-level moderate || true
        cd ..
      done
  artifacts:
    reports:
      junit: security-audit.xml
    expire_in: 1 week
  only:
    - main
    - develop

# Contract Testing and Deployment
contracts:test:
  image: foundry敦煌/foundry:latest
  stage: test
  script:
    - forge install
    - forge build
    - forge test -vv
  artifacts:
    paths:
      - contracts/out/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

contracts:deploy:testnet:
  image: foundry敦煌/foundry:latest
  stage: deploy
  environment:
    name: staging
    url: https://xorb-staging.example.com
  variables:
    DEPLOY_ENV: staging
  script:
    - forge script script/Deploy.s.sol --rpc-url $TESTNET_RPC_URL --broadcast
    - bash deployment/scripts/update-contract-addresses.sh --env staging
  artifacts:
    paths:
      - contracts/out/
      - deployment/addresses/staging-addresses.json
    expire_in: 1 month
  only:
    - develop
  when: manual

contracts:deploy:mainnet:
  image: foundry敦煌/foundry:latest
  stage: deploy
  environment:
    name: production
    url: https://xorb.io
  variables:
    DEPLOY_ENV: production
  script:
    - forge script script/Deploy.s.sol --rpc-url $MAINNET_RPC_URL --broadcast --verify
    - bash deployment/scripts/verify-contracts.sh --env production
    - bash deployment/scripts/update-contract-addresses.sh --env production
  artifacts:
    paths:
      - contracts/out/
      - deployment/addresses/production-addresses.json
    expire_in: 1 month
  only:
    - main
  when: manual

# Frontend Deployment
frontend:minimax_os:staging:
  <<: *default_job
  stage: build
  environment:
    name: staging
    url: https://xorb-staging.example.com
  variables:
    VITE_APP_ENV: staging
    VITE_NETWORK_NAME: "Polygon Amoy Testnet"
    VITE_RPC_URL: $TESTNET_RPC_URL
    VITE_CHAIN_ID: "80002"
    VITE_EXPLORER_URL: "https://amoy.polygonscan.com"
  script:
    - cd minimax-os
    - pnpm run build
    - # Deploy to staging server or CDN
    - rsync -avz --delete dist/ $STAGING_SERVER:/var/www/xorb-staging/
  artifacts:
    paths:
      - minimax-os/dist/
    expire_in: 1 month
  only:
    - develop
  dependencies:
    - contracts:deploy:testnet

frontend:minimax_os:production:
  <<: *default_job
  stage: deploy
  environment:
    name: production
    url: https://xorb.io
  variables:
    VITE_APP_ENV: production
    VITE_NETWORK_NAME: "Polygon Mainnet"
    VITE_RPC_URL: $MAINNET_RPC_URL
    VITE_CHAIN_ID: "137"
    VITE_EXPLORER_URL: "https://polygonscan.com"
  script:
    - cd minimax-os
    - pnpm run build
    - # Deploy to production CDN (Netlify, Vercel, etc.)
    - npx netlify deploy --prod --dir=dist
  artifacts:
    paths:
      - minimax-os/dist/
    expire_in: 3 months
  only:
    - main
  dependencies:
    - contracts:deploy:mainnet

frontend:blockchain_os:staging:
  <<: *default_job
  stage: build
  environment:
    name: staging
    url: https://blockchain-xorb-staging.example.com
  variables:
    VITE_APP_ENV: staging
    VITE_NETWORK_NAME: "Polygon Amoy Testnet"
    VITE_RPC_URL: $TESTNET_RPC_URL
    VITE_CHAIN_ID: "80002"
  script:
    - cd xorb-blockchain-os
    - pnpm run build
    - rsync -avz --delete dist/ $STAGING_SERVER:/var/www/blockchain-xorb-staging/
  artifacts:
    paths:
      - xorb-blockchain-os/dist/
    expire_in: 1 month
  only:
    - develop
  dependencies:
    - contracts:deploy:testnet

frontend:blockchain_os:production:
  <<: *default_job
  stage: deploy
  environment:
    name: production
    url: https://blockchain.xorb.io
  variables:
    VITE_APP_ENV: production
    VITE_NETWORK_NAME: "Polygon Mainnet"
    VITE_RPC_URL: $MAINNET_RPC_URL
    VITE_CHAIN_ID: "137"
  script:
    - cd xorb-blockchain-os
    - pnpm run build
    - npx netlify deploy --prod --dir=dist --site $BLOCKCHAIN_NETLIFY_SITE_ID
  artifacts:
    paths:
      - xorb-blockchain-os/dist/
    expire_in: 3 months
  only:
    - main
  dependencies:
    - contracts:deploy:mainnet

# Mobile App Build
mobile:build:staging:
  <<: *default_job
  stage: build
  environment:
    name: staging
  variables:
    EXPO_PUBLIC_APP_ENV: staging
    EXPO_PUBLIC_NETWORK_NAME: "Polygon Amoy Testnet"
    EXPO_PUBLIC_RPC_URL: $TESTNET_RPC_URL
    EXPO_PUBLIC_CHAIN_ID: "80002"
  script:
    - npm install -g @expo/cli
    - cd xorb-mobile-new
    - pnpm install
    - npx expo export --platform web
    - npx expo export --platform android --type apk
    - # Upload to internal distribution
    - curl -F "file=@dist/*.apk" $INTERNAL_DISTRIBUTION_URL
  artifacts:
    paths:
      - xorb-mobile-new/dist/
    expire_in: 1 month
  only:
    - develop

mobile:build:production:
  <<: *default_job
  stage: deploy
  environment:
    name: production
  variables:
    EXPO_PUBLIC_APP_ENV: production
    EXPO_PUBLIC_NETWORK_NAME: "Polygon Mainnet"
    EXPO_PUBLIC_RPC_URL: $MAINNET_RPC_URL
    EXPO_PUBLIC_CHAIN_ID: "137"
  script:
    - npm install -g @expo/cli
    - cd xorb-mobile-new
    - pnpm install
    - npx expo export --platform web
    - npx expo export --platform android --type aab
    - npx expo export --platform ios --type archive
    - # Upload to app stores
    - # App Store Connect
    - xcrun altool --upload-app -f dist/*.ipa -t ios -u $APPLE_ID -p $APPLE_APP_PASSWORD || true
    - # Google Play Console
    - fastlane supply --aab dist/*.aab --package_name com.xorb || true
  artifacts:
    paths:
      - xorb-mobile-new/dist/
    expire_in: 6 months
  only:
    - main
  dependencies:
    - contracts:deploy:mainnet

# IPFS Deployment
ipfs:deploy:
  <<: *default_job
  stage: deploy
  environment:
    name: production
  variables:
    PINATA_API_KEY: $PINATA_API_KEY
    PINATA_SECRET_KEY: $PINATA_SECRET_KEY
  script:
    - bash deployment/scripts/deploy-ipfs.sh --env production
  artifacts:
    paths:
      - deployment/ipfs/
    expire_in: 1 year
  only:
    - main

# Performance Testing
performance:test:
  <<: *default_job
  stage: test
  script:
    - npm install -g lighthouse
    - npx serve minimax-os/dist -l 3000 &
    - sleep 5
    - lhci autorun --config=.lighthouserc.js
  artifacts:
    reports:
      junit: lhci-report.xml
    paths:
      - .lighthouseci/
    expire_in: 1 week
  only:
    - main
  dependencies:
    - frontend:minimax_os:production

# Notification
notify:discord:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      STATUS="success"
      if [[ "$CI_JOB_STATUS" == "failed" ]]; then
        STATUS="failed"
      elif [[ "$CI_JOB_STATUS" == "canceled" ]]; then
        STATUS="canceled"
      fi
      
      curl -X POST -H 'Content-Type: application/json' \
        -d "{\"content\": \"🚀 Xorb Pipeline $STATUS\nEnvironment: $CI_COMMIT_REF_NAME\nCommit: $CI_COMMIT_SHA\nJob: $CI_JOB_NAME\"}" \
        $DISCORD_WEBHOOK
  only:
    - main
    - develop
  when: always

notify:email:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache msmtp
    - |
      echo "From: $NOTIFICATION_EMAIL
      To: $NOTIFICATION_RECIPIENTS
      Subject: Xorb Deployment - $CI_COMMIT_REF_NAME
      Body: Deployment completed for commit $CI_COMMIT_SHA on branch $CI_COMMIT_REF_NAME
      Status: $CI_JOB_STATUS
      URL: $CI_ENVIRONMENT_URL" > /tmp/email.txt
    - cat /tmp/email.txt | msmtp $NOTIFICATION_RECIPIENTS
  only:
    - main
  when: always
  allow_failure: true

# Cleanup
cleanup:artifacts:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - # Clean up artifacts older than 30 days
    - curl -X DELETE -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
      "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/jobs/keep/?days=30"
  only:
    - main
  when: always
  allow_failure: true

# Monitoring
monitoring:health_check:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      # Health check endpoints
      curl -f $FRONTEND_URL/health || exit 1
      curl -f $API_URL/health || exit 1
      echo "Health checks passed"
  only:
    - main
  when: always
  allow_failure: true