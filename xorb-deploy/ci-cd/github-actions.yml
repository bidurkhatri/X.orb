# Xorb CI/CD Pipeline Configuration for GitHub Actions

name: Xorb CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Code Quality and Testing
  code-quality:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [minimax-os, xorb-blockchain-os, xorb-mobile-new]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.project }}
        
      - name: Run linting
        run: pnpm run lint
        working-directory: ${{ matrix.project }}
        
      - name: Run type checking
        run: pnpm run type-check
        working-directory: ${{ matrix.project }}
        continue-on-error: true
        
      - name: Run tests
        run: pnpm run test
        working-directory: ${{ matrix.project }}
        
      - name: Build project
        run: pnpm run build
        working-directory: ${{ matrix.project }}

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: npm install -g pnpm
        working-directory: .
        
      - name: Run npm audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true
        
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # Smart Contract Testing and Deployment
  contracts:
    name: Smart Contract Operations
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
          
      - name: Install dependencies
        run: pnpm install
        working-directory: contracts
        
      - name: Compile contracts
        run: forge build
        working-directory: contracts
        
      - name: Run contract tests
        run: forge test -vv
        working-directory: contracts
        
      - name: Deploy to testnet
        if: github.ref != 'refs/heads/main'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
        run: |
          forge script script/Deploy.s.sol --rpc-url ${{ secrets.TESTNET_RPC_URL }} --broadcast
        working-directory: contracts
        
      - name: Deploy to mainnet
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.MAINNET_DEPLOYER_PRIVATE_KEY }}
        run: |
          forge script script/Deploy.s.sol --rpc-url ${{ secrets.MAINNET_RPC_URL }} --broadcast --verify
        working-directory: contracts
        
      - name: Verify contracts
        if: github.ref == 'refs/heads/main'
        env:
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          # Verify all deployed contracts
          for contract in ContractA ContractB ContractC; do
            forge verify-contract --chain-id 137 $contract ${{ secrets.POLYGONSCAN_API_KEY }}
          done
        working-directory: contracts
        
      - name: Update contract addresses
        run: |
          bash deployment/scripts/update-contract-addresses.sh --env ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          
      - name: Upload contract artifacts
        uses: actions/upload-artifact@v3
        with:
          name: contract-artifacts
          path: contracts/out/

  # Frontend Deployment
  frontend:
    name: Frontend Deployment
    runs-on: ubuntu-latest
    needs: [code-quality, contracts]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    
    strategy:
      matrix:
        project: [minimax-os, xorb-blockchain-os]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Download contract artifacts
        uses: actions/download-artifact@v3
        with:
          name: contract-artifacts
          path: deployment/contracts/
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.project }}
        
      - name: Build project
        env:
          VITE_NETWORK_NAME: ${{ github.ref == 'refs/heads/main' && 'Polygon Mainnet' || 'Polygon Amoy Testnet' }}
          VITE_RPC_URL: ${{ github.ref == 'refs/heads/main' && secrets.MAINNET_RPC_URL || secrets.TESTNET_RPC_URL }}
          VITE_CHAIN_ID: ${{ github.ref == 'refs/heads/main' && '137' || '80002' }}
          VITE_EXPLORER_URL: ${{ github.ref == 'refs/heads/main' && 'https://polygonscan.com' || 'https://amoy.polygonscan.com' }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm run build
        working-directory: ${{ matrix.project }}
        
      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: ${{ matrix.project }}/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
      - name: Deploy to staging
        if: github.ref != 'refs/heads/main'
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: ${{ matrix.project }}/dist
          production-branch: develop
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy staging from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
      - name: Deploy to IPFS
        run: |
          bash deployment/scripts/deploy-ipfs.sh --env ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build-${{ matrix.project }}
          path: ${{ matrix.project }}/dist

  # Mobile App Build
  mobile:
    name: Mobile App Build
    runs-on: ubuntu-latest
    needs: [code-quality, contracts]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup Java for Android
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          
      - name: Setup Expo
        run: npm install -g @expo/cli
        
      - name: Download contract artifacts
        uses: actions/download-artifact@v3
        with:
          name: contract-artifacts
          path: deployment/contracts/
          
      - name: Install dependencies
        run: npm install
        working-directory: xorb-mobile-new
        
      - name: Build mobile app
        env:
          EXPO_PUBLIC_NETWORK_NAME: ${{ github.ref == 'refs/heads/main' && 'Polygon Mainnet' || 'Polygon Amoy Testnet' }}
          EXPO_PUBLIC_RPC_URL: ${{ github.ref == 'refs/heads/main' && secrets.MAINNET_RPC_URL || secrets.TESTNET_RPC_URL }}
          EXPO_PUBLIC_CHAIN_ID: ${{ github.ref == 'refs/heads/main' && '137' || '80002' }}
        run: |
          # Build web version
          npx expo export --platform web
          
          # Build for Android (APK)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx expo export --platform android --type aab
          else
            npx expo export --platform android --type apk
          fi
        working-directory: xorb-mobile-new
        
      - name: Upload mobile artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mobile-builds
          path: xorb-mobile-new/dist/

  # IPFS Deployment
  ipfs:
    name: IPFS Deployment
    runs-on: ubuntu-latest
    needs: [frontend, mobile]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to IPFS
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          bash deployment/scripts/deploy-ipfs.sh --env production

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build-minimax-os
          path: build/
          
      - name: Start test server
        run: |
          npx serve build -l 3000 &
          
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Notification
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [frontend, mobile, ipfs]
    if: always()
    
    steps:
      - name: Notify Discord
        if: always()
        uses: Ilshidur/action-discord@master
        with:
          args: |
            🚀 Xorb Deployment ${{ job.status }}
            Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [frontend, mobile, ipfs]
    if: always()
    
    steps:
      - name: Clean up old artifacts
        run: |
          # Clean up old GitHub artifacts
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -X DELETE \
               "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?days_old=7"